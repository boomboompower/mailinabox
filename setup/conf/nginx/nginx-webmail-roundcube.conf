	# Roundcube catch-all. Root must point at public_html/ (Roundcube 1.7+)
	# so index.php is found. Assets are served via static.php with PATH_INFO.
	location / {
		root /usr/local/share/roundcube/public_html;
		index index.php;

		location ~ /\.(?!well-known) {
			deny all;
			return 404;
		}

		location ~ \.php$ {
			try_files $uri =404;
			fastcgi_pass unix:$PHP_FPM_SOCK;
			fastcgi_index index.php;
			fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
			include fastcgi_params;
		}

		try_files $uri $uri/ /index.php$is_args$args;

		add_header Strict-Transport-Security "max-age=15768000" always;
		add_header X-Frame-Options "SAMEORIGIN" always;
		add_header X-Content-Type-Options nosniff always;
	}

	# Roundcube routes all static assets (skins, plugins, program/js) through
	# static.php with PATH_INFO - e.g. static.php/skins/elastic/styles/styles.min.css
	# The standard ~ \.php$ location above won't match this pattern.
	location ~ ^/static\.php {
		root /usr/local/share/roundcube/public_html;
		fastcgi_split_path_info ^(/static\.php)(/.+)$;
		fastcgi_pass unix:$PHP_FPM_SOCK;
		fastcgi_param SCRIPT_FILENAME $document_root/static.php;
		fastcgi_param PATH_INFO $fastcgi_path_info;
		include fastcgi_params;
	}

