[Definition]
# Matches failed Z-Push ActiveSync auth attempts from the nginx access log.
# Using the nginx log captures the real client IP since Z-Push authenticates
# via loopback IMAP (127.0.0.1:993) and the dovecot jail only sees 127.0.0.1.
# Matches 401 responses to the ActiveSync endpoint on any hosted domain.
failregex = ^<HOST> .* "(POST|OPTIONS) /Microsoft-Server-ActiveSync.* HTTP/[0-9.]+" 401
ignoreregex =
