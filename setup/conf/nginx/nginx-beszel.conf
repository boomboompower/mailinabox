	# Beszel monitoring dashboard - only included when MONITORING_TOOL=beszel.
	# TRUSTED_AUTH_HEADER is set on the Beszel hub so it auto-logs in the user
	# using the email nginx injects after validating their admin session.
	location = /admin/beszel {
		return 301 /admin/beszel/;
	}
	location /admin/beszel/ {
		auth_request /internal/admin-auth;
		error_page 401 403 =403 /admin/;

		# Inject fixed internal identity - nginx overwrites any client-supplied value.
		# Any authenticated admin maps to the same beszel account; monitoring
		# data is not per-user so shared identity is correct here.
		proxy_set_header X-Beszel-User "${BESZEL_USER}";

		proxy_pass http://$BESZEL_HUB_HOST:8090/;
		proxy_set_header Host $host;
		proxy_set_header X-Forwarded-For $remote_addr;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_http_version 1.1;
		# Beszel uses WebSockets for real-time updates.
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";
		proxy_read_timeout 3600s;
		add_header Strict-Transport-Security "max-age=15768000" always;
		add_header X-Content-Type-Options nosniff always;
	}
