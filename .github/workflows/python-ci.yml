name: Python CI

# Runs a comprehensive lint and test suite on all pushes and pull requests.
# This is the main  CI workflow for the Python codebase. It runs on both Ubuntu
# 24.04 and 26.04 to ensure compatibility with both LTS and latest Ubuntu releases.
#
# Linting is done with Ruff, which is very fast and covers a wide range of checks.
# Testing is done with pytest, using xdist to run tests in parallel across all CPU cores.
# The test suite is configured to use the "worksteal" distribution mode, which dynamically
# balances test execution across workers to minimize total runtime, especially when tests have varying durations.

on:
  push:
    paths:
      - 'setup/**'
      - 'management/**'
      - 'tests/**'
      - 'setup/components/defs/filter/**'
      - '.github/workflows/python-ci.yml'
  pull_request:
    paths:
      - 'setup/**'
      - 'management/**'
      - 'tests/**'
      - 'setup/components/defs/filter/**'
      - '.github/workflows/python-ci.yml'

jobs:
  lint-and-test:
    strategy:
      matrix:
        include:
          # Test on the Python version each Ubuntu LTS actually ships.
          # Using a fixed "3.10" previously meant we were never testing against
          # the deployment Python, hiding 3.12+ compatibility issues.
          - os: ubuntu-24.04
            python: "3.12"
          - os: ubuntu-26.04
            # "3.x" resolves to the latest stable Python 3 release, which
            # tracks what Ubuntu 26.04 ships closely enough for CI purposes.
            python: "3.x"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-xdist ruff doit exclusiveprocess \
            flask passlib[bcrypt] "bcrypt<4.0" pyotp fido2 qrcode[pil] \
            email-validator dnspython cryptography rtyaml python-dateutil expiringdict

      # ruff check: linting (unused imports, undefined names, style issues, etc.)
      - name: Ruff lint
        run: python -m ruff check setup/ management/ tests/

      # ruff format --check: fails if any file would be reformatted.
      # Keeps diffs clean and avoids "format-only" commits cluttering history.
      - name: Ruff format
        run: python -m ruff format --check setup/ management/ tests/

      - name: Run tests
        run: python -m pytest tests/ -n auto --dist=worksteal --tb=short
