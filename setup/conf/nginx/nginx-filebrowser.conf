	# FileBrowser at /files/ - redirect bare /files to /files/ first.
	location = /files {
		return 301 /files/;
	}
	location /files/ {
		# Defer hostname resolution to request time so nginx starts even if
		# the filebrowser container/service is not running.
		set $filebrowser_backend "$FILEBROWSER_HOST";
		proxy_pass http://$filebrowser_backend:8080;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $remote_addr;
		proxy_set_header X-Forwarded-Proto $scheme;
		add_header Strict-Transport-Security "max-age=15768000" always;
		add_header X-Frame-Options "DENY" always;
		add_header X-Content-Type-Options nosniff always;
	}

