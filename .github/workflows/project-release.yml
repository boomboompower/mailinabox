name: Publish release

# Fires when a version tag (v1.2.3) is pushed. Packages the repo as a source
# tarball and publishes it as a GitHub release. This is what `boxctl update`
# fetches - it is separate from the frontend hash builds (frontend-release.yml)
# which are not full releases.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. v2026.07.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid version format: ${{ inputs.version }} (expected v2026.07.0)"
            exit 1
          fi

      - name: Check version is greater than latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NEW="${{ inputs.version }}"
          LATEST=$(gh release list --limit 1 --json tagName --jq '.[0].tagName // empty')
          if [ -z "$LATEST" ]; then
            exit 0
          fi
          if [ "$NEW" = "$LATEST" ]; then
            echo "Version $NEW already exists."
            exit 1
          fi
          HIGHEST=$(printf '%s\n%s' "$NEW" "$LATEST" | sort -V | tail -1)
          if [ "$HIGHEST" != "$NEW" ]; then
            echo "Version $NEW must be greater than latest release $LATEST"
            exit 1
          fi

      - name: Package source tarball
        run: |
          VERSION="${{ inputs.version }}"
          # Write version file into the archive so installed boxes know their version
          # without needing git history (git archive strips it).
          echo "$VERSION" > VERSION
          git archive --format=tar.gz --prefix="mailinabox-${VERSION}/" \
            --add-file=VERSION HEAD \
            -o "mailinabox-${VERSION}.tar.gz"
          rm VERSION
          sha256sum "mailinabox-${VERSION}.tar.gz" | cut -d' ' -f1 > "mailinabox-${VERSION}.tar.gz.sha256"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "TARBALL=mailinabox-${VERSION}.tar.gz" >> "$GITHUB_ENV"

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # --tag creates the tag atomically with the release so no orphaned tags
          # exist if this step fails. Published manually from the GitHub UI after review.
          gh release create "$VERSION" \
            "$TARBALL" "${TARBALL}.sha256" \
            --tag "$VERSION" \
            --title "Mail-in-a-Box $VERSION" \
            --generate-notes \
            --draft
