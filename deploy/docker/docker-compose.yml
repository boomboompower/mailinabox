# Mail-in-a-Box - Docker Compose
#
# Multi-container deployment that mirrors the bare-metal service layout.
# Each container runs one logical service group and shares a named volume
# for persistent data (STORAGE_ROOT).
#
# Usage:
#   cp docker/.env.example docker/.env   # fill in required vars
#   docker compose -f docker/docker-compose.yml up -d
#
# Optional services are gated by profiles:
#   --profile oxi          webmail (oxi.email)
#   --profile filebrowser  FileBrowser file manager
#   --profile radicale     Radicale CardDAV/CalDAV
#   --profile munin        Munin system monitoring
#   --profile beszel       Beszel system monitoring
#   --profile clamav       ClamAV antivirus milter

networks:
  # Fixed subnet so the dns container can have a stable IP that other
  # containers reference as their DNS resolver.
  miab-internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
          ip_range: 172.28.0.128/25

  # Isolated network shared only by nginx and webmail. Keeping oxi off the
  # main internal network means no other container can reach it to spoof
  # X-Real-IP headers, even if compromised. nginx bridges both networks.
  oxi-internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.29.0.0/29

volumes:
  storage:
    driver: local
  redis-data:
    driver: local
  radicale-collections:
    driver: local

# ---------------------------------------------------------------------------
# Core services
# ---------------------------------------------------------------------------

services:
  dns:
    image: ghcr.io/boomboompower/mailinabox-dns:latest
    build:
      context: ../..
      dockerfile: deploy/docker/dns/Dockerfile
    container_name: miab-dns
    restart: unless-stopped
    networks:
      miab-internal:
        # Static IP so every other container can hard-code this as their
        # DNS resolver without a chicken-and-egg dependency on service
        # discovery.
        ipv4_address: 172.28.0.2
    ports:
      - "${PORT_DNS:-5354}:5353/tcp"
      - "${PORT_DNS:-5354}:5353/udp"
    volumes:
      - storage:${STORAGE_ROOT:-/home/user-data}
    env_file:
      - .env
    environment:
      RUNTIME: docker
    healthcheck:
      # Use dig to query the local DNS server directly, bypassing Docker's
      # internal DNS and ensuring the server is actually responsive.
      test: ["CMD", "bash", "-c", "dig @127.0.0.1 google.com +short | grep -q ."]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: miab-redis
    restart: unless-stopped
    networks:
      - miab-internal
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rspamd:
    image: ghcr.io/boomboompower/mailinabox-rspamd:latest
    build:
      context: ../..
      dockerfile: deploy/docker/rspamd/Dockerfile
    container_name: miab-rspamd
    restart: unless-stopped
    networks:
      - miab-internal
    dns:
      - 172.28.0.2
    volumes:
      - storage:${STORAGE_ROOT:-/home/user-data}
    env_file:
      - .env
    environment:
      RUNTIME: docker
      REDIS_HOST: redis
    depends_on:
      redis:
        condition: service_healthy
      dns:
        condition: service_started
    healthcheck:
      test: ["CMD", "bash", "-c", "echo '' > /dev/tcp/127.0.0.1/11332"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 60s

  mail:
    image: ghcr.io/boomboompower/mailinabox-mail:latest
    build:
      context: ../..
      dockerfile: deploy/docker/mail/Dockerfile
    container_name: miab-mail
    restart: unless-stopped
    networks:
      - miab-internal
    dns:
      - 172.28.0.2
    ports:
      - "${PORT_SMTP:-2525}:25"
      - "${PORT_SMTPS:-465}:465"
      - "${PORT_SUBMISSION:-587}:587"
      - "${PORT_IMAPS:-993}:993"
      - "${PORT_SIEVE:-4190}:4190"
    volumes:
      - storage:${STORAGE_ROOT:-/home/user-data}
    env_file:
      - .env
    environment:
      RUNTIME: docker
      RSPAMD_HOST: rspamd
      CLAMAV_HOST: ${CLAMAV_HOST:-clamav}
      ENABLE_CLAMAV: ${ENABLE_CLAMAV:-false}
      # Added to self-signed cert SANs so webmail can verify Dovecot's cert
      # when connecting via IMAPS using the container service name.
      SSL_EXTRA_SANS: mail
    depends_on:
      dns:
        condition: service_started
      rspamd:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "echo '' > /dev/tcp/127.0.0.1/25"]
      interval: 5s
      timeout: 3s
      retries: 24
      start_period: 300s

  management:
    image: ghcr.io/boomboompower/mailinabox-management:latest
    build:
      context: ../..
      dockerfile: deploy/docker/management/Dockerfile
      args:
        BACKUP_TOOL: ${BACKUP_TOOL:-restic}
    container_name: miab-management
    restart: unless-stopped
    networks:
      - miab-internal
    dns:
      - 172.28.0.2
    # Port 10222 is internal-only; nginx proxies /admin and the API.
    expose:
      - "10222"
    volumes:
      - storage:${STORAGE_ROOT:-/home/user-data}
    env_file:
      - .env
    environment:
      RUNTIME: docker
      MAIL_HOST: mail
      DNS_HOST: dns
      MANAGEMENT_HOST: management
      RADICALE_HOST: radicale
      WEBMAIL_HOST: webmail
      FILEBROWSER_HOST: filebrowser
      BESZEL_HUB_HOST: beszel-hub
    depends_on:
      mail:
        condition: service_healthy
      dns:
        condition: service_started
    healthcheck:
      test: ["CMD", "bash", "-c", "echo '' > /dev/tcp/127.0.0.1/10222"]
      interval: 3s
      timeout: 2s
      retries: 20
      start_period: 5s

  nginx:
    image: ghcr.io/boomboompower/mailinabox-nginx:latest
    build:
      context: ../..
      dockerfile: deploy/docker/nginx/Dockerfile
    container_name: miab-nginx
    restart: unless-stopped
    networks:
      - miab-internal
      - oxi-internal
    dns:
      - 172.28.0.2
    ports:
      - "${PORT_HTTP:-8080}:80"
      - "${PORT_HTTPS:-8443}:443"
    volumes:
      - storage:${STORAGE_ROOT:-/home/user-data}
    env_file:
      - .env
    environment:
      RUNTIME: docker
    depends_on:
      management:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "echo '' > /dev/tcp/127.0.0.1/80"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Optional: oxi.email webmail  (--profile oxi)
  # ---------------------------------------------------------------------------

  webmail:
    image: ghcr.io/boomboompower/mailinabox-webmail:latest
    build:
      context: ../..
      dockerfile: deploy/docker/webmail/Dockerfile
    container_name: miab-webmail
    restart: unless-stopped
    profiles:
      - oxi
    networks:
      - miab-internal
      - oxi-internal
    dns:
      - 172.28.0.2
    expose:
      - "3001"
    volumes:
      - storage:${STORAGE_ROOT:-/home/user-data}
    env_file:
      - .env
    environment:
      RUNTIME: docker
      # oxi connects to Dovecot and Postfix by container service name.
      IMAP_HOST: mail
      SMTP_HOST: mail
      # Only trust forwarded IP headers from connections arriving on oxi-internal,
      # which only nginx can reach. Other miab-internal containers connect on a
      # separate interface and are not in the trusted range.
      TRUSTED_PROXIES: "172.29.0.0/29"
    depends_on:
      mail:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "echo '' > /dev/tcp/127.0.0.1/3001"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Optional: FileBrowser  (--profile filebrowser)
  # ---------------------------------------------------------------------------

  filebrowser:
    image: ghcr.io/boomboompower/mailinabox-filebrowser:latest
    build:
      context: ../..
      dockerfile: deploy/docker/optional/filebrowser/Dockerfile
    container_name: miab-filebrowser
    restart: unless-stopped
    profiles:
      - filebrowser
    networks:
      - miab-internal
    dns:
      - 172.28.0.2
    expose:
      - "8080"
    volumes:
      - storage:${STORAGE_ROOT:-/home/user-data}
    env_file:
      - .env
    environment:
      RUNTIME: docker
      MANAGEMENT_HOST: management
      FILEBROWSER_BIND: "0.0.0.0"
    depends_on:
      management:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "echo '' > /dev/tcp/127.0.0.1/8080"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Optional: Radicale CardDAV/CalDAV  (--profile radicale)
  # ---------------------------------------------------------------------------

  radicale:
    image: ghcr.io/boomboompower/mailinabox-radicale:latest
    build:
      context: ../..
      dockerfile: deploy/docker/optional/radicale/Dockerfile
    container_name: miab-radicale
    restart: unless-stopped
    profiles:
      - radicale
    networks:
      - miab-internal
    dns:
      - 172.28.0.2
    expose:
      - "5232"
    volumes:
      - storage:${STORAGE_ROOT:-/home/user-data}
      - radicale-collections:/var/lib/radicale
    env_file:
      - .env
    environment:
      RUNTIME: docker
      MANAGEMENT_HOST: management
    depends_on:
      management:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "echo '' > /dev/tcp/127.0.0.1/5232"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Optional: Munin monitoring  (--profile munin)
  # ---------------------------------------------------------------------------

  munin:
    image: ghcr.io/boomboompower/mailinabox-munin:latest
    build:
      context: ../..
      dockerfile: deploy/docker/monitoring/Dockerfile
    container_name: miab-munin
    restart: unless-stopped
    profiles:
      - munin
    networks:
      - miab-internal
    dns:
      - 172.28.0.2
    expose:
      - "4949"
    volumes:
      - storage:${STORAGE_ROOT:-/home/user-data}
    env_file:
      - .env
    environment:
      RUNTIME: docker
    depends_on:
      mail:
        condition: service_healthy
      nginx:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "echo '' > /dev/tcp/127.0.0.1/4949"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Optional: ClamAV antivirus milter  (--profile clamav)
  # ---------------------------------------------------------------------------

  clamav:
    image: ghcr.io/boomboompower/mailinabox-clamav:latest
    build:
      context: ../..
      dockerfile: deploy/docker/optional/clamav/Dockerfile
    container_name: miab-clamav
    restart: unless-stopped
    profiles:
      - clamav
    networks:
      - miab-internal
    expose:
      - "7357"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo '' > /dev/tcp/127.0.0.1/7357"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s

  # ---------------------------------------------------------------------------
  # Optional: Beszel system monitoring  (--profile beszel)
  # ---------------------------------------------------------------------------

  beszel-hub:
    image: ghcr.io/boomboompower/mailinabox-beszel-hub:latest
    build:
      context: ../..
      dockerfile: deploy/docker/beszel-hub/Dockerfile
    container_name: miab-beszel-hub
    restart: unless-stopped
    profiles:
      - beszel
    networks:
      - miab-internal
    dns:
      - 172.28.0.2
    expose:
      - "8090"
    volumes:
      - storage:${STORAGE_ROOT:-/home/user-data}
    env_file:
      - .env
    environment:
      RUNTIME: docker
      TRUSTED_AUTH_HEADER: X-Beszel-User
      DISABLE_PASSWORD_AUTH: "true"
    depends_on:
      management:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "echo '' > /dev/tcp/127.0.0.1/8090"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 20s

  beszel-agent:
    image: ghcr.io/boomboompower/mailinabox-beszel-agent:latest
    build:
      context: ../..
      dockerfile: deploy/docker/beszel-agent/Dockerfile
    container_name: miab-beszel-agent
    restart: unless-stopped
    profiles:
      - beszel
    networks:
      - miab-internal
    expose:
      - "45876"
    volumes:
      - storage:${STORAGE_ROOT:-/home/user-data}
      # Host proc/sys mounts so the agent reports host-level metrics.
      - /proc:/proc:ro
      - /sys:/sys:ro
    pid: "host"
    env_file:
      - .env
    environment:
      RUNTIME: docker
      HUB_URL: http://beszel-hub:8090
      PORT: "45876"
      LISTEN: "0.0.0.0"
    depends_on:
      beszel-hub:
        condition: service_healthy
