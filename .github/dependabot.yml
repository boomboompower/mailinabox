version: 2

updates:
  # GitHub Actions - keeps action versions (checkout@v4, setup-buildx@v3, etc.)
  # current. Action version drift is a common supply-chain risk and easy to miss
  # since there's no other mechanism that flags stale pinned versions.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"

  # Admin frontend (Vue 3 / Vite). Dependabot reads package.json and opens PRs
  # for outdated deps. The bun.lock file is regenerated by running bun install
  # after accepting the PR - Dependabot cannot do this itself since it doesn't
  # know about bun, but the version bumps in package.json are still tracked.
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps(frontend)"

  # Docs site (Next.js / Fumadocs). Same bun.lock caveat as above.
  - package-ecosystem: npm
    directory: /docs
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps(docs)"

  # Python CI dependencies are declared inline in python-ci.yml rather than in
  # a requirements file, so Dependabot cannot track them automatically. Review
  # package versions in .github/workflows/python-ci.yml manually each release.
