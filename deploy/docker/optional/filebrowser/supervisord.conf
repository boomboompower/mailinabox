[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0
pidfile=/run/supervisord.pid

[unix_http_server]
file=/run/supervisor.sock

[supervisorctl]
serverurl=unix:///run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory=supervisor.rpcinterface:make_main_rpcinterface

# ---- FileBrowser ----
[program:filebrowser]
command=/bin/bash -c 'source /etc/mailinabox.conf && exec sudo -u www-data /usr/local/bin/filebrowser --database "$STORAGE_ROOT/filebrowser/filebrowser.db"'
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=10

# ---- Control socket server ----
# Accepts service lifecycle requests from the management container over a
# Unix socket and dispatches to /etc/miab/handlers/<service> <action>.
# Returns synchronous OK/ERROR so management gets real error propagation.
[program:control-socket]
command=/bin/bash -c 'source /etc/mailinabox.conf && exec /usr/local/sbin/control-socket-server "$STORAGE_ROOT/sockets/filebrowser.sock" /etc/miab/handlers'
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=50
