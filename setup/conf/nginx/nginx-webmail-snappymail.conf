	# SnappyMail catch-all. The bundled top-level data/ directory is unused
	# (snappymail-data-dir.php redirects storage to $STORAGE_ROOT/snappymail)
	# but is still denied below in case it's ever served by mistake.
	location / {
		root /usr/local/share/snappymail;
		index index.php;

		location ~ ^/(data)(/|$) {
			deny all;
			return 404;
		}

		location ~ /\.(?!well-known) {
			deny all;
			return 404;
		}

		location ~ \.php$ {
			try_files $uri =404;
			fastcgi_pass unix:$PHP_FPM_SOCK;
			fastcgi_index index.php;
			fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
			include fastcgi_params;
		}

		try_files $uri $uri/ /index.php$is_args$args;

		add_header Strict-Transport-Security "max-age=15768000" always;
		add_header X-Frame-Options "DENY" always;
		add_header X-Content-Type-Options nosniff always;
	}

