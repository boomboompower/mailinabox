	# Radicale CardDAV/CalDAV - only included when ENABLE_RADICALE=true
	location /radicale/ {
		# Defer hostname resolution to request time so nginx starts even if
		# the radicale container/service is not running.
		set $radicale_backend "$RADICALE_HOST";
		rewrite ^/radicale/(.*) /$1 break;
		proxy_pass http://$radicale_backend:5232;
		proxy_set_header Host $host;
		proxy_set_header X-Forwarded-For $remote_addr;
		proxy_set_header X-Script-Name /radicale;
		proxy_pass_header Authorization;
		add_header Strict-Transport-Security "max-age=15768000" always;
		add_header X-Frame-Options "DENY" always;
		add_header X-Content-Type-Options nosniff always;
	}

	# DAV auto-discovery redirects
	location = /.well-known/carddav { return 301 https://$host/radicale/; }
	location = /.well-known/caldav  { return 301 https://$host/radicale/; }
