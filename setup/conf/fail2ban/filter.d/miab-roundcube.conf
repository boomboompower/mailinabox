[Definition]
# Matches failed Roundcube webmail login attempts from its own userlogins
# log (requires $config['log_logins'] = true; written by
# setup/webmail/roundcube.sh). Roundcube runs via PHP-FPM behind nginx
# FastCGI (not a reverse proxy), so $_SERVER['REMOTE_ADDR'] - and therefore
# this log's IP field - is already the real client IP; no loopback-IP
# problem here the way oxi.email's IMAP-based auth has.
failregex = ^\[.*\]: Failed login for .* from <HOST> in session .*$
ignoreregex =
