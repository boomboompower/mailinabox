	# Cypht catch-all. The .env file and several directories contain sensitive
	# data and must not be served - nginx ignores .htaccess so the restrictions
	# Cypht ships for Apache are reimplemented explicitly here.
	location / {
		root /usr/local/share/cypht;
		index index.php;

		# Static assets within modules/themes are public - must come before the
		# modules deny rule since nginx picks the first matching regex location.
		location ~ ^/modules/.*\.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
			root /usr/local/share/cypht;
			expires 30d;
			add_header Cache-Control "public";
		}

		# Sensitive directories - none of these should ever be web-accessible.
		location ~ ^/(config|scripts|database|tests|lib|modules|third_party|language)(/|$) {
			deny all;
			return 404;
		}

		# Block .env and other sensitive file types. .env lives in the web
		# root and contains credentials - this rule is not optional.
		location ~ \.(env|ini|log|conf|lock|yml|yaml|sh|sql|db)$ {
			deny all;
			return 404;
		}

		location ~ /\.(?!well-known) {
			deny all;
			return 404;
		}

		location ~ \.php$ {
			try_files $uri =404;
			fastcgi_pass unix:$PHP_FPM_SOCK;
			fastcgi_index index.php;
			fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
			include fastcgi_params;
		}

		try_files $uri $uri/ /index.php$is_args$args;

		add_header Strict-Transport-Security "max-age=15768000" always;
		add_header X-Frame-Options "DENY" always;
		add_header X-Content-Type-Options nosniff always;
	}

