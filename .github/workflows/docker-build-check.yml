name: Docker build check

# Verifies that all core Docker images build successfully on pull requests.
# This catches broken Dockerfiles and bad component changes before they land
# on main, where docker-publish.yml would push broken images to GHCR.
#
# Only core services are built here - optional services (radicale, clamav, etc.)
# are verified by docker-publish.yml after merge since they're less likely to
# break and the extra build time on PRs isn't worth it.

on:
  pull_request:
    paths:
      - 'deploy/docker/**'
      - 'setup/components/**'
      - 'management/**'
      - 'frontend/**'
      - 'setup/components/defs/filter/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build all core images in parallel (bake handles concurrency).
      # No push - this is verification only. Layer cache is shared with the
      # publish workflow so warm-cache builds here stay fast.
      - name: Build core images
        uses: docker/bake-action@v6
        with:
          files: deploy/docker/docker-compose.yml
          targets: dns,mail,management,nginx,rspamd
          set: |
            *.cache-from=type=gha,scope=miab
            *.cache-to=type=gha,scope=miab,mode=max
            management.args.GIT_SHA=${{ github.sha }}
