	# Internal auth subrequest location - not reachable directly from outside.
	# nginx auth_request calls this; /whoami returns 200 for valid admin sessions.
	location = /internal/admin-auth {
		internal;
		proxy_pass http://$MANAGEMENT_HOST:10222/whoami;
		proxy_pass_request_body off;
		proxy_set_header Content-Length "";
		proxy_set_header X-Original-URI $request_uri;
	}
