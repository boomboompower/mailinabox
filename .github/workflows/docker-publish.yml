name: Publish Docker images

# Builds all container images and pushes them to GHCR so users can
# "docker compose pull" instead of building from source on first install.
#
# Triggers only when files that affect image contents actually change.
# Each image is tagged :latest (head of main) and :sha-<short> for pinning.

on:
  push:
    branches: [main]
    paths:
      - 'deploy/docker/**'
      - 'setup/components/**'
      - 'management/**'
      - 'frontend/**'
      - 'setup/components/defs/filter/**'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build and push all images defined in the compose file.
      # The image: fields in docker-compose.yml provide the :latest tags.
      # Layer cache is stored in GitHub Actions cache to speed up reruns.
      - name: Build and push all images
        uses: docker/bake-action@v6
        with:
          files: deploy/docker/docker-compose.yml
          push: true
          set: |
            *.cache-from=type=gha,scope=miab
            *.cache-to=type=gha,scope=miab,mode=max
            management.args.GIT_SHA=${{ github.sha }}

      # Re-tag every image with the short commit SHA for pinned deployments.
      - name: Tag images with commit SHA
        env:
          SHORT_SHA: ${{ github.sha }}
        run: |
          SHORT="${SHORT_SHA:0:8}"
          for svc in dns mail management nginx rspamd webmail filebrowser radicale munin clamav beszel-hub beszel-agent; do
            docker buildx imagetools create \
              -t "ghcr.io/boomboompower/mailinabox-${svc}:sha-${SHORT}" \
              "ghcr.io/boomboompower/mailinabox-${svc}:latest"
          done

  # Scan published images for known CVEs and surface results in the GitHub
  # Security tab. Only core services are scanned - they're the ones users
  # actually run and the ones most likely to have interesting attack surface.
  #
  # ignore-unfixed: true skips CVEs with no available patch, which keeps the
  # noise low. A mail server will always have some unpatched CVEs in the base
  # image; we care about things we can actually act on.
  scan:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      packages: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        service: [dns, mail, management, nginx, rspamd]
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan ${{ matrix.service }} for vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/boomboompower/mailinabox-${{ matrix.service }}:latest
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          # category disambiguates results per-service in the Security tab
          category: docker-${{ matrix.service }}
