	# Netdata real-time monitoring - only included when MONITORING_TOOL=netdata.
	# Auth is enforced via auth_request -> /whoami (existing admin session check).
	# Netdata binds to 127.0.0.1 only; this is the sole external entry point.
	location = /admin/netdata {
		return 301 /admin/netdata/;
	}
	location /admin/netdata/ {
		auth_request /internal/admin-auth;
		error_page 401 403 =403 /admin/;
		# Proxy to /v1/ directly - the classic local dashboard. The root serves a
		# loader that tries to fetch the cloud UI and nags about missing plugins.
		proxy_pass http://127.0.0.1:19999/v1/;
		proxy_set_header Host $host;
		proxy_set_header X-Forwarded-For $remote_addr;
		proxy_set_header X-Forwarded-Proto $scheme;
		# Netdata streams data via chunked responses - disable buffering.
		proxy_buffering off;
		proxy_read_timeout 60s;
		add_header Strict-Transport-Security "max-age=15768000" always;
		add_header X-Frame-Options "DENY" always;
		add_header X-Content-Type-Options nosniff always;
	}
